# Local-libvirt rootfs image catalog (ADR-0251). File-authoritative: build-fs --image <name>
# resolves a row here. source.kind = "virt-builder" carries a template; "cloud-image" carries a
# sha256-pinned url. family selects the FamilyCustomizer (rhel|debian|suse).
#
# kdump_capable: true iff the makedumpfile the build installs from this release's repos (>= 1.7.9)
# can filter a v7.0-class from-source kernel's vmcore via the default `kdump` method; false rows hit
# the cause-neutral kdump_core_incomplete remediation (host_dump still works). It is kernel-relative
# (to the current default target) and a curated build-time snapshot verified against distro package
# indexes (2026-06-26), guarded by tests/images/test_rootfs_catalog.py — not live upstream truth.

[[image]]
name = "fedora-kdive-ready-43"
distro = "fedora"
version = "43"
family = "rhel"
arch = "x86_64"
kind = "debug"
kdump_capable = false  # makedumpfile 1.7.8 < 1.7.9; the #817 regression reference
source = { kind = "virt-builder", template = "fedora-43" }

[[image]]
name = "fedora-kdive-ready-44"
distro = "fedora"
version = "44"
family = "rhel"
arch = "x86_64"
kind = "debug"
kdump_capable = true  # makedumpfile 1.7.9 — the kdump-capable default
source = { kind = "cloud-image", url = "https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2", sha256 = "28680fe5b371a5a82ebf43a31926e086a168e59949d03969c5093e7071f90b7f" }  # pragma: allowlist secret

