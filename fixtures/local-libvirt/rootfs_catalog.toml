# Local-libvirt rootfs image catalog (ADR-0251). File-authoritative: build-fs --image <name>
# resolves a row here. source.kind = "virt-builder" carries a template; "cloud-image" carries a
# sha256-pinned url. family selects the FamilyCustomizer (rhel|debian|suse).
#
# makedumpfile_version: the curated build-time makedumpfile version this release's repos install,
# verified against distro package indexes (2026-06-26) and guarded by
# tests/images/test_rootfs_catalog.py. It is the per-image operand of the computed kdump-capability
# predicate (kdive.images.kdump_support, ADR-0253): an agent reads the capability for its target
# kernel via images.describe, rather than a stored kernel-relative bit. A row whose makedumpfile is
# too old for the target kernel computes `incapable` and hits the cause-neutral
# kdump_core_incomplete remediation at vmcore.fetch (host_dump still works). EL8/EL9 ship
# makedumpfile bundled in kexec-tools (no standalone package); the snapshot records the bundled
# binary's version. Not live upstream truth.

[[image]]
name = "fedora-kdive-ready-43"
distro = "fedora"
version = "43"
family = "rhel"
arch = "x86_64"
kind = "debug"
makedumpfile_version = "1.7.8"  # < 1.7.9; the #817 regression reference
source = { kind = "virt-builder", template = "fedora-43" }

[[image]]
name = "fedora-kdive-ready-44"
distro = "fedora"
version = "44"
family = "rhel"
arch = "x86_64"
kind = "debug"
makedumpfile_version = "1.7.9"  # the kdump-capable default for a v7.0 kernel
source = { kind = "cloud-image", url = "https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2", sha256 = "28680fe5b371a5a82ebf43a31926e086a168e59949d03969c5093e7071f90b7f" }  # pragma: allowlist secret

