# ppc64le (POWER) row (fedora-secondary tree — Fedora publishes ppc64le as a secondary arch).
# Proves the catalog `arch` column and the arch-aware provisioning seam (machine=pseries,
# console=hvc0, kdive.domain.platform) end-to-end. Live VM provisioning on POWER is unproven — the
# POWER host has /dev/kvm but no qemu-system-ppc64/libvirt yet.
