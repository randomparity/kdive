repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        # Helm chart templates are Go templates, not standalone YAML, so the
        # parser cannot decode them. `helm lint` validates the chart instead.
        exclude: ^deploy/helm/kdive/templates/
      - id: check-executables-have-shebangs
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        # Delegates to the host's shellcheck binary rather than the upstream docker
        # image: koalaman/shellcheck ships no ppc64le manifest, so the docker_image
        # hook fails to pull on POWER. check-setup-deps.sh already requires shellcheck
        # as a recommended host package, and `just lint-shell` uses PATH shellcheck.
        entry: shellcheck
        language: system
        types: [shell]
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      # shfmt-src builds shfmt from Go source (like the rhysd/actionlint hook below).
      # The default `shfmt` id pulls the shfmt-py wrapper, which downloads a prebuilt
      # binary; upstream publishes no ppc64le release, so that variant fails to install
      # on POWER. shfmt-src is pure Go and builds natively on any arch with a toolchain.
      - id: shfmt-src
        args: [-i, "2", -d]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
  - repo: local
    hooks:
      - id: ty
        name: ty check
        # Delegates to the justfile recipe so the type-check command has one definition
        # shared with CI (`just type` → whole-tree `uv run ty check`).
        entry: just type
        language: system
        types: [python]
        pass_filenames: false
      - id: lint-ansible
        name: lint-ansible
        # Delegates to the justfile recipe so there is one definition shared with CI.
        entry: just lint-ansible
        language: system
        files: ^deploy/ansible/
        pass_filenames: false
      - id: schema-immutable
        name: applied migrations are byte-immutable (ADR-0015)
        # Rejects modify/delete/rename of an existing src/kdive/db/schema/*.sql; only
        # new migrations may be added. A cosmetic edit to an applied migration changes
        # its whole-file checksum and breaks upgrades of any DB migrated by an earlier
        # build (#1218). Invokes python3 directly (not `just`) so the venv-free CI
        # pre-commit job runs it too; diffs against HEAD, so a clean tree passes.
        entry: python3 scripts/schema_immutable_guard.py
        language: system
        files: ^src/kdive/db/schema/.*\.sql$
        pass_filenames: false
