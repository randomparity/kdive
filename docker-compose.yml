# Operator tooling for the live walking-skeleton run (#26, ADR-0035 §3).
#
# Stands up the three backing services the kdive MCP server needs for a real end-to-end run
# driven by hand or on a self-hosted KVM runner: Postgres (system of record), MinIO
# (S3-compatible object store for vmcore artifacts), and a mock OIDC issuer (so the server's
# JWTVerifier validates real signed bearer tokens). This compose is NOT on any automated CI
# test path — the non-gated exit-criterion tests construct RequestContext in-process and use
# the disposable-Postgres testcontainer (ADR-0015), so they need none of this.
#
# Point the kdive server at these services:
#   KDIVE_DATABASE_URL=postgresql://kdive:kdive@localhost:5432/kdive
#   KDIVE_OIDC_ISSUER=http://localhost:8090/default
#   KDIVE_OIDC_JWKS_URI=http://localhost:8090/default/jwks
#   KDIVE_OIDC_AUDIENCE=kdive
#   KDIVE_S3_ENDPOINT_URL=http://localhost:9000
#   KDIVE_S3_BUCKET=kdive-artifacts
#   KDIVE_S3_REGION=us-east-1
# Mint a token for an operator request from the mock issuer's token endpoint (see its README).
#
# Images are pinned to explicit tags for reproducibility (no :latest).
#
# ADR-0088 (M2.1) extends this backend-only compose with the app tier: a `migrate`
# one-shot and the three `server`/`worker`/`reconciler` processes, all built from the
# repo Dockerfile and wired purely through `KDIVE_*`. Inside the compose network the
# app services reach the backends by service name on their CONTAINER ports
# (postgres:5432, oidc:8080, minio:9000) — not the host-published ports above, which
# are for a server run on the host. See deploy/compose/README.md for the bring-up.

# Shared aux readiness-probe cadence (ADR-0090 §5), merged into each app service's
# healthcheck via `<<: *readyz_cadence`. Each service supplies its own `test` because
# the /readyz URL port differs per process (server 9464, worker 9465, reconciler 9466).
x-readyz-cadence: &readyz_cadence
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

# Shared backend wiring, declared once and merged into every app service via
# `<<: *backends`. The server adds its own HTTP bind vars on top.
x-backends: &backends
  KDIVE_DATABASE_URL: postgresql://kdive:kdive@postgres:5432/kdive  # pragma: allowlist secret — local dev only
  KDIVE_OIDC_ISSUER: http://oidc:8080/default
  KDIVE_OIDC_JWKS_URI: http://oidc:8080/default/jwks
  KDIVE_OIDC_AUDIENCE: kdive
  KDIVE_S3_ENDPOINT_URL: http://minio:9000
  KDIVE_S3_BUCKET: kdive-artifacts
  KDIVE_S3_REGION: us-east-1
  # kdive's object store signs with boto3's default credential chain (the standard AWS_*
  # vars, objectstore.py), so the app tier authenticates to MinIO with its root creds —
  # without these the server/worker /readyz MinIO check can never pass. Matches the
  # minio service's MINIO_ROOT_USER / MINIO_ROOT_PASSWORD above.
  AWS_ACCESS_KEY_ID: minioadmin  # pragma: allowlist secret — local dev only
  AWS_SECRET_ACCESS_KEY: minioadmin  # pragma: allowlist secret — local dev only

services:
  postgres:
    image: postgres:17
    # max_connections sized for the test suite: when this backend is used as a test
    # override (KDIVE_TEST_PG_URL), ~18 xdist workers share one server (ADR-0400).
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      POSTGRES_USER: kdive
      POSTGRES_PASSWORD: kdive # pragma: allowlist secret — local dev only
      POSTGRES_DB: kdive
    ports:
      - "${KDIVE_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kdive -d kdive"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin # pragma: allowlist secret — local dev only
    ports:
      - "${KDIVE_MINIO_PORT:-9000}:9000"
      - "${KDIVE_MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the artifacts bucket once MinIO is healthy, then exits.
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/kdive-artifacts

  # Multi-arch mock OIDC issuer. The upstream ghcr.io/navikt/mock-oauth2-server is amd64/arm64
  # only, breaking `docker compose up` on a POWER host, so kdive mirrors it (deploy/mock-oidc,
  # ADR-0357) on a multi-arch JRE — same jar version, byte-identical token contract. By default
  # `build:` builds that mirror locally and tags it kdive-mock-oidc:dev (mirrors the kdive:dev
  # app-image pattern), so `docker compose up` works offline and on any arch whose bases publish.
  #
  # KDIVE_OIDC_IMAGE overrides the reference so an operator PULLS the published GHCR mirror
  # (#1184, ADR-0358) — digest-pinned for reproducibility — instead of building it, e.g.
  #   export KDIVE_OIDC_IMAGE=ghcr.io/randomparity/mock-oauth2-server@sha256:e11ba633538714499356765720c05ef57ecb0ac70db4ca780f6a44d2e49a070a
  # It parallels KDIVE_IMAGE for the app image (ADR-0359). A digest ref cannot coexist with a
  # taggable local build, so the override is the pull path and the unset default is the build
  # path — never both. The publish-mock-oidc workflow prints the digest to pin on each republish.
  oidc:
    image: ${KDIVE_OIDC_IMAGE:-kdive-mock-oidc:dev}
    build: ./deploy/mock-oidc
    environment:
      # Bind the mock issuer to 0.0.0.0:8080 inside the container (published as 8090 on host).
      SERVER_PORT: "8080"
    ports:
      - "${KDIVE_OIDC_PORT:-8090}:8080"

  # Forward-only schema rollout as a dedicated one-shot (ADR-0088 decision 4). The
  # app services gate on its successful completion, so they never hit the DB before
  # migrations finish. The runner (ADR-0015) is locked, transactional, and idempotent,
  # so no extra coordination is needed. `build: .` builds the shared image once.
  #
  # KDIVE_IMAGE overrides the tag so the compose smoke (tests/image/test_compose_smoke.py,
  # ADR-0359) drives a pre-built image (e.g. a multi-arch release image) instead of building
  # from source; unset, it stays `kdive:dev` and `build: .` builds it, so local dev is unchanged.
  migrate:
    build: .
    image: ${KDIVE_IMAGE:-kdive:dev}
    command: ["migrate"]
    environment:
      <<: *backends
    depends_on:
      postgres:
        condition: service_healthy

  server:
    image: ${KDIVE_IMAGE:-kdive:dev}
    command: ["server"]
    environment:
      <<: *backends
      KDIVE_HTTP_HOST: 0.0.0.0
      KDIVE_HTTP_PORT: "8000"
      # Bind the aux health/metrics listener to all interfaces INSIDE the container so
      # the in-container healthcheck (and an in-network scrape) reaches it. The port is
      # never published (no host mapping below), so the container network namespace is
      # its access boundary — the unauthenticated /readyz/metrics stay non-public.
      KDIVE_HEALTH_BIND_ADDR: 0.0.0.0:9464
    healthcheck:
      <<: *readyz_cadence
      # urlopen raises HTTPError on /readyz's 503 (not-ready), so the broad except maps
      # any non-200 / unreachable listener to a clean exit 1 with no stderr traceback.
      test:
        - CMD
        - python
        - -c
        - |
          import sys, urllib.request
          try:
              ok = urllib.request.urlopen("http://127.0.0.1:9464/readyz", timeout=3).status == 200
          except Exception:
              ok = False
          sys.exit(0 if ok else 1)
    ports:
      # Host-publish side only; the in-container bind (KDIVE_HTTP_PORT above) stays 8000. Reuses
      # the same var the host-daemon live-stack binds, so one override moves both serving paths.
      - "${KDIVE_HTTP_PORT:-8000}:8000"
    # Self-contained graph: a bare `docker compose up server` pulls in migrate
    # (completed), the bucket-creation one-shot (completed → minio healthy + bucket
    # exists), and the issuer (started; the mock has no healthcheck, and JWKS is
    # fetched lazily on first request anyway).
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      oidc:
        condition: service_started

  # The worker does real build/install I/O as a non-root user, so it needs writable,
  # correctly-owned volumes for the build workspace and install staging (ADR-0088
  # decision 3); server and reconciler need none. It writes vmcore/transcript
  # artifacts to the object store, so it also waits for the bucket to exist.
  worker:
    image: ${KDIVE_IMAGE:-kdive:dev}
    command: ["worker"]
    environment:
      <<: *backends
      KDIVE_HEALTH_BIND_ADDR: 0.0.0.0:9465
    healthcheck:
      <<: *readyz_cadence
      test:
        - CMD
        - python
        - -c
        - |
          import sys, urllib.request
          try:
              ok = urllib.request.urlopen("http://127.0.0.1:9465/readyz", timeout=3).status == 200
          except Exception:
              ok = False
          sys.exit(0 if ok else 1)
    volumes:
      - kdive-build:/var/lib/kdive/build
      - kdive-install:/var/lib/kdive/install
      # Demo warm-tree build bootstrap: bind-mount a host kernel tree read-only.
      # - ~/src/linux:/srv/linux:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  reconciler:
    image: ${KDIVE_IMAGE:-kdive:dev}
    command: ["reconciler"]
    environment:
      <<: *backends
      KDIVE_HEALTH_BIND_ADDR: 0.0.0.0:9466
    healthcheck:
      <<: *readyz_cadence
      test:
        - CMD
        - python
        - -c
        - |
          import sys, urllib.request
          try:
              ok = urllib.request.urlopen("http://127.0.0.1:9466/readyz", timeout=3).status == 200
          except Exception:
              ok = False
          sys.exit(0 if ok else 1)
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  # Opt-in metrics collection (ADR-0189). Behind the `obs` profile so the turnkey
  # `docker compose up` graph is unchanged. Scrapes each process's aux /metrics over the
  # compose network (those aux ports stay unpublished); only the UI is published to the host.
  #   docker compose --profile obs up -d prometheus    # then open http://localhost:9090
  # TSDB is ephemeral container-local (no named volume) — matches the demo posture; a
  # `docker compose down` drops history. Only the config is mounted (read-only).
  prometheus:
    image: prom/prometheus:v3.12.0
    profiles: ["obs"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=6h
    volumes:
      - ./deploy/compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${KDIVE_PROMETHEUS_PORT:-9090}:9090"

  # Grafana for the kdive-overview dashboard (deploy/grafana/README.md). Behind the `obs`
  # profile alongside prometheus. Anonymous access is enabled for a frictionless LOCAL dev box
  # only — do not reuse this posture off localhost. Datasource + dashboard are provisioned, so
  # state is declarative on every start (no named volume).
  grafana:
    image: grafana/grafana:13.0.3
    profiles: ["obs"]
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/compose/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/kdive-overview.json:/var/lib/grafana/dashboards/kdive-overview.json:ro
    ports:
      - "${KDIVE_GRAFANA_PORT:-3000}:3000"

volumes:
  kdive-build:
  kdive-install:
