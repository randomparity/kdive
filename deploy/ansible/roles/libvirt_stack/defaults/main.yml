---
libvirt_stack_packages_debian:
  - libvirt-daemon-system
  - libvirt-clients
  - qemu-utils
  - libguestfs-tools
  - e2fsprogs           # host tune2fs: build-fs repack strips the ext4 orphan_file feature (ADR-0351)
  - virtinst
  - gnutls-bin
  # community.libvirt modules run on the target and import these; Ubuntu does not
  # pull them in transitively the way Fedora's libvirt packages do.
  - python3-libvirt
  - python3-lxml
libvirt_stack_packages_redhat:
  - libvirt
  - libvirt-client
  - qemu-img
  - libguestfs-tools-c
  - e2fsprogs           # host tune2fs: build-fs repack strips the ext4 orphan_file feature (ADR-0351)
  - virt-install
  - gnutls-utils
  - python3-libvirt
  - python3-lxml

# qemu emulator package by os_family + arch.
libvirt_stack_qemu_package_map:
  Debian:
    x86_64: qemu-system-x86
    ppc64le: qemu-system-ppc
  RedHat:
    x86_64: qemu-kvm
    ppc64le: qemu-kvm

libvirt_stack_monolithic_units:
  - libvirtd.service
  - libvirtd.socket
  - libvirtd-ro.socket
  - libvirtd-admin.socket
  - libvirtd-tls.socket
  - libvirtd-tcp.socket

# NOTE: virtproxyd-tls.socket is enabled by the libvirt_tls role, not here.
libvirt_stack_modular_sockets:
  - virtqemud.socket
  - virtnetworkd.socket
  - virtstoraged.socket
  - virtnodedevd.socket
  - virtsecretd.socket
  - virtproxyd.socket
