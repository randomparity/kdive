---
- name: Ensure the runner service account exists in kvm and libvirt
  ansible.builtin.user:
    name: "{{ github_runner_user }}"
    system: true
    create_home: true
    shell: /bin/bash
    groups: [kvm, libvirt]
    append: true

- name: Install the kernel-debug toolchain (RHEL-family)
  ansible.builtin.dnf:
    name: "{{ live_vm_host_packages }}"
    state: present
  when: ansible_os_family == 'RedHat'

- name: Install the foreign qemu emulator for cross-arch TCG (RHEL-family)
  ansible.builtin.dnf:
    name: "{{ live_vm_host_foreign_qemu_map[ansible_architecture] }}"
    state: present
  when:
    - ansible_os_family == 'RedHat'
    - ansible_architecture in live_vm_host_foreign_qemu_map

- name: Find the host kernels under /boot (vmlinuz-* x86, vmlinux-* ppc64le)
  # Stock RHEL/Rocky ships /boot/vmlinuz-* 0600 root:root; libguestfs' supermin appliance
  # build (ADR-0222, #694/#1156) — probed by check-local-libvirt.sh as a FAIL — needs them
  # readable by the non-root runner user. Re-apply after a kernel upgrade (see runbook).
  ansible.builtin.find:
    paths: /boot
    patterns: ["vmlinuz-*", "vmlinux-*"]
  register: live_vm_host_boot_kernels

- name: Make the host kernels kvm-group-readable for the service account
  # 0640 root:kvm, not 0644: the runner user is in the kvm group (added above), so this is
  # genuinely group-scoped rather than world-readable — it does not fully undo the distro's
  # 0600 hardening for every local uid. file+mode reports changed only when the mode/group
  # actually changes, so a converged re-run is 0-changed (the spec's idempotence bar).
  ansible.builtin.file:
    path: "{{ item.path }}"
    group: kvm
    mode: "0640"
  loop: "{{ live_vm_host_boot_kernels.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Enable linger so /run/user/<uid> exists with no login session
  ansible.builtin.command: "loginctl enable-linger {{ github_runner_user }}"
  args:
    creates: "/var/lib/systemd/linger/{{ github_runner_user }}"

- name: Install uv system-wide (the venv builder; not in the debug toolchain)
  # The service account runs `uv sync` below; /opt is root-owned so uv must be on the
  # system PATH, not a per-user install. pip installs the console script to /usr/local/bin.
  # --break-system-packages: RHEL/Rocky 10's platform Python is PEP 668 externally-managed,
  # so a plain system `pip install` errors; the flag is accepted (and a no-op) on pip >= 23.
  ansible.builtin.pip:
    name: uv
    state: present
    extra_args: --break-system-packages

- name: Create the venv root owned by the service account
  # /opt is root-owned 0755, so a non-root `git` clone cannot mkdir it — create it first.
  ansible.builtin.file:
    path: "{{ live_vm_venv }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_user }}"
    mode: "0755"

- name: Check out the project source for the venv
  ansible.builtin.git:
    repo: "{{ live_vm_repo_url }}"
    dest: "{{ live_vm_venv }}"
    version: "{{ live_vm_repo_version }}"
  become: true
  become_user: "{{ github_runner_user }}"
  register: live_vm_host_checkout

- name: Build the venv against the SYSTEM interpreter (ABI-match python3-libguestfs)  # noqa: no-handler
  # noqa no-handler: not a handler on purpose — the venv must exist before the libguestfs
  # symlink task later in THIS play, but handlers run post-play (too late on first provision).
  # uv defaults to a managed CPython whose minor version may differ from the distro's
  # python3-libguestfs .so; pin to /usr/bin/python3 so the symlinked native module ABI-matches.
  # Run whenever the checkout advanced (main is a moving ref), NOT `creates:`-gated — a creates
  # guard would freeze the venv's deps at first-provision while the source moved on, so a live
  # dependency added to main would never reach the venv the worker imports from. On a converged
  # host (main unchanged) the git task is unchanged, so uv sync is skipped and the run is 0-changed.
  ansible.builtin.command:
    cmd: uv sync --python /usr/bin/python3 --group live
    chdir: "{{ live_vm_venv }}"
  become: true
  become_user: "{{ github_runner_user }}"
  when: live_vm_host_checkout is changed
  changed_when: true

- name: Locate the system libguestfs binding files
  # find's `paths` is a LITERAL directory — it does NOT glob-expand (unlike `patterns`), so a
  # wildcard like /usr/lib64/python3*/site-packages matches nothing and returns an empty list.
  # Build the concrete site-packages path from the interpreter facts (the same version the venv
  # dest below uses, so source and dest stay consistent).
  ansible.builtin.find:
    paths: "/usr/lib64/python{{ ansible_python.version.major }}.{{ ansible_python.version.minor }}/site-packages"
    patterns: ["guestfs.py", "libguestfsmod*.so"]
  register: live_vm_host_libguestfs_files

- name: Assert the libguestfs binding was found (fail loud, not an empty symlink loop)
  # Without this, a missing binding (wrong path / python3-libguestfs absent) would make the
  # symlink loop a silent no-op and only surface one task later at the check-local-libvirt gate.
  ansible.builtin.assert:
    that: live_vm_host_libguestfs_files.matched > 0
    fail_msg: >-
      guestfs.py / libguestfsmod*.so not found under the system python site-packages —
      is python3-libguestfs installed (it is in live_vm_host_packages) and does the ansible
      interpreter match /usr/bin/python3 (the venv's --python)?

- name: Symlink the libguestfs binding into the venv site-packages (no PyPI wheel exists)
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: >-
      {{ live_vm_venv }}/.venv/lib/python{{ ansible_python.version.major }}.{{
      ansible_python.version.minor }}/site-packages/{{ item.path | basename }}
    state: link
    force: true
  loop: "{{ live_vm_host_libguestfs_files.files }}"
  loop_control:
    label: "{{ item.path }}"
  become: true
  become_user: "{{ github_runner_user }}"

- name: Create the staging directories owned by the service account
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_user }}"
    mode: "0755"
  loop: "{{ live_vm_staging_dirs }}"

- name: Ensure the /var/lib/kdive parent is world-traversable
  ansible.builtin.file:
    path: /var/lib/kdive
    state: directory
    mode: "0755"

- name: Persist the virt_image_t fcontext on both staging trees
  community.general.sefcontext:
    target: "{{ item }}(/.*)?"
    setype: virt_image_t
    state: present
  loop: "{{ live_vm_staging_dirs }}"
  when: ansible_selinux.status is defined and ansible_selinux.status == 'enabled'

- name: Apply the SELinux label now
  # -v so restorecon prints "Relabeled …" for each file it changes; without it restorecon is
  # silent and the stdout-length changed_when would always report ok even when it relabeled.
  # Runs inline (not a handler) so the label is applied in time and covers any content staged
  # into the dirs out of band.
  ansible.builtin.command: "restorecon -Rv {{ item }}"
  loop: "{{ live_vm_staging_dirs }}"
  register: live_vm_host_restorecon
  changed_when: live_vm_host_restorecon.stdout | length > 0
  when: ansible_selinux.status is defined and ansible_selinux.status == 'enabled'

- name: Run the host-contract gate
  ansible.builtin.import_tasks: verify.yml
