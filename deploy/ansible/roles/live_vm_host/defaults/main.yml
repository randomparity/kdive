---
# Kernel-debug toolchain + venv build deps the live_vm contract needs beyond libvirt_stack, on
# the Ubuntu 26.04 runner base (ADR-0387). drgn and libvirt-python are built from PyPI into the
# venv, so their -dev headers (libvirt-dev, libelf/libdw/libkdumpfile) are build deps here;
# libguestfs has no PyPI package and is symlinked from the system python3-guestfs binding.
live_vm_host_packages:
  - crash
  - makedumpfile
  - kexec-tools
  - kdump-tools        # Debian name for kdump-utils
  - gdb
  - python3-guestfs    # the system libguestfs binding, built for Ubuntu 26.04's Python 3.14
  - elfutils           # eu-readelf: the live-vm store scripts read the kernel/debuginfo build-id (#1292)
  - debuginfod         # debuginfod-find: fetch matching vmlinux debuginfo by build-id (#1292)
  - git
  - python3-pip        # Ubuntu ships no pip for the system python; uv needs it
  - build-essential    # gcc/make: uv builds drgn + libvirt-python from source
  - pkg-config
  - libvirt-dev        # libvirt-python build
  - libelf-dev         # drgn build
  - libdw-dev          # drgn build
  - libkdumpfile-dev   # drgn kdump support

# The remote-libvirt `live_vm` family (#1424, ADR-0425, `just test-live-remote`) needs NO
# additional host package here: it connects OUT to a remote qemu+tls:// host over the libvirt TLS
# client stack (`libvirt-clients` + `gnutls-bin`) the `libvirt_stack` role already declares, and
# its introspect leg reuses the worker-side vmcore postmortem (`drgn`, built into the venv above
# via libvirt-dev/libelf-dev/libdw-dev/libkdumpfile-dev). The reconciler it depends on is a kdive
# host process, not a system package. This nil delta is recorded so the "declare host deps in the
# same change" discipline (AGENTS.md) is auditable rather than silent — add packages here if a
# remote proof ever grows a genuine host-tool need.

# Container runtime for the #1293 self-hosted job's on-box compose stack (scripts/live-stack/up.sh).
# docker-compose-v2 provides `docker compose` (the plugin) on Ubuntu 26.04.
live_vm_host_docker_packages:
  - docker.io
  - docker-compose-v2

# pip installs the uv console script to /usr/local/bin. Reference uv by absolute path in the
# venv-build command so it is found under become regardless of sudo's PATH handling; override
# if pip is configured to install console scripts elsewhere.
live_vm_host_uv_bin: /usr/local/bin/uv
