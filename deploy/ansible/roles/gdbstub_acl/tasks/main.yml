---
# --- Fedora / RHEL: firewalld rich rules with explicit source address. A plain
# --- port-open would open the port to the whole zone; rich rules restrict the source. ---
- name: Configure firewalld rich-rule ACL (RedHat)
  when: ansible_os_family == 'RedHat'
  block:
    - name: Accept TLS + gdbstub from the worker CIDR
      ansible.posix.firewalld:
        rich_rule: >-
          rule family="ipv4" source address="{{ worker_cidr }}"
          port port="{{ item }}" protocol="tcp" accept
        permanent: true
        immediate: true
        state: enabled
      loop:
        - "{{ gdbstub_acl_tls_port }}"
        - "{{ gdbstub_acl_gdbstub_port_range_dash }}"

    - name: Drop TLS + gdbstub from any other source (lower priority)
      ansible.posix.firewalld:
        rich_rule: >-
          rule priority="100" family="ipv4"
          port port="{{ item }}" protocol="tcp" drop
        permanent: true
        immediate: true
        state: enabled
      loop:
        - "{{ gdbstub_acl_tls_port }}"
        - "{{ gdbstub_acl_gdbstub_port_range_dash }}"

    - name: Read back the rich rules (read-only)
      ansible.builtin.command: firewall-cmd --list-rich-rules
      register: gdbstub_acl_firewalld_rules
      changed_when: false

    - name: Assert the default-drop rules are present (off-CIDR refused)
      ansible.builtin.assert:
        that:
          - gdbstub_acl_firewalld_rules.stdout is search('port="' ~ gdbstub_acl_tls_port ~ '"\s+protocol="tcp"\s+drop')
          - gdbstub_acl_firewalld_rules.stdout is search('port="' ~ gdbstub_acl_gdbstub_port_range_dash ~ '"\s+protocol="tcp"\s+drop')
        fail_msg: >-
          No default-drop rich rule for :{{ gdbstub_acl_tls_port }} or gdbstub range — port is world-open.

# --- Ubuntu/Debian: ufw. The gdbstub tier is raw-TCP with NO TLS, so this ACL is the
# --- ONLY auth for those ports — leaving it unenforced means unauthenticated full-VM
# --- memory access. ufw enforces only when ACTIVE, and activating ufw applies a global
# --- "deny incoming", so we MUST allow the SSH/management port first (or enabling ufw
# --- locks the host out), then add the port-specific allow-from-CIDR + deny rules, then
# --- enable ufw. The role asserts ufw ends up active — it fails closed rather than
# --- reporting success with the debug ports world-open. Set gdbstub_acl_ufw_enable=false
# --- only if you enforce these ports by other means (the assert still guards you).
- name: Configure ufw ACL (Debian)
  when: ansible_os_family == 'Debian'
  block:
    - name: Allow the SSH/management port (so enabling ufw cannot lock the host out)
      community.general.ufw:
        rule: allow
        direction: in
        proto: tcp
        to_port: "{{ ansible_port | default(22) }}"

    # ufw is strict first-match with no rule priorities (unlike the firewalld path's
    # priority="100" drop). `insert: 1` pins the worker-CIDR allows at the TOP of the
    # chain, ahead of the deny rules below — so they win regardless of insertion history.
    # Without this, appended rules map to chain order only on the first run: a later
    # `worker_cidr` change appends the new allow *after* the existing deny-anywhere and is
    # silently shadowed (it lands behind the deny and never matches). The allows are
    # already CIDR-scoped, so inserting them first cannot widen access.
    - name: Allow TLS from the worker CIDR
      community.general.ufw:
        rule: allow
        direction: in
        proto: tcp
        from_ip: "{{ worker_cidr }}"
        to_port: "{{ gdbstub_acl_tls_port }}"
        insert: 1

    - name: Allow gdbstub range from the worker CIDR
      community.general.ufw:
        rule: allow
        direction: in
        proto: tcp
        from_ip: "{{ worker_cidr }}"
        # ufw wants the COLON form — use gdbstub_range, NOT the dash var.
        to_port: "{{ gdbstub_range }}"
        insert: 1

    - name: Deny TLS from any other source
      community.general.ufw:
        rule: deny
        direction: in
        proto: tcp
        to_port: "{{ gdbstub_acl_tls_port }}"

    - name: Deny gdbstub range from any other source
      community.general.ufw:
        rule: deny
        direction: in
        proto: tcp
        to_port: "{{ gdbstub_range }}"

    # ufw enabling sets DEFAULT_FORWARD_POLICY=DROP, which would block libvirt's guest
    # NAT forwarding — and the remote-libvirt install/kdump-capture planes need the guest
    # to egress to the object store. FORWARD is routed-through traffic, independent of the
    # INPUT-chain gdbstub/TLS ACL, so allowing it does NOT weaken this role's protection;
    # it just preserves the forwarding behavior that existed before ufw was enabled.
    - name: Allow forwarded traffic so enabling ufw does not break libvirt guest egress
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: '^DEFAULT_FORWARD_POLICY='
        line: DEFAULT_FORWARD_POLICY="ACCEPT"
      register: gdbstub_acl_ufw_forward_policy
      when: gdbstub_acl_ufw_enable | bool

    - name: Enable ufw so the ACL is enforced (SSH already allowed above)
      community.general.ufw:
        state: enabled
      when: gdbstub_acl_ufw_enable | bool

    - name: Reload ufw if the forward policy changed under an active ufw  # noqa: command-instead-of-module
      # state:enabled does not reload an already-active ufw, so a forward-policy edit on a
      # re-run needs an explicit reload; on the first run `enable` already read the new file.
      ansible.builtin.command: ufw reload
      when:
        - gdbstub_acl_ufw_enable | bool
        - gdbstub_acl_ufw_forward_policy.changed
      changed_when: true

    # A previous worker_cidr leaves an `allow` to these ports for a now-irrelevant source.
    # The CIDR-scoped allow above re-grants the current source, but the stale one lingers —
    # and since this ACL is the ONLY auth for the raw-TCP gdbstub tier, an allow for a
    # decommissioned/reassigned CIDR is a real over-permission. Prune every ALLOW to the
    # protected ports whose source is not the current worker_cidr. Bounded by construction:
    # only `ALLOW IN` lines for exactly the TLS port or gdbstub range, current-CIDR excluded;
    # SSH (different port) and the deny rules (not `ALLOW IN`) can never match. Delete
    # highest-numbered first so renumbering does not invalidate the remaining targets.
    - name: Prune stale worker-CIDR allows for the protected ports  # noqa: command-instead-of-module
      ansible.builtin.shell: |
        set -euo pipefail
        # `grep` exits 1 on no match; wrap each filter in `|| true` so "nothing stale to
        # prune" (the steady state) is success, not a pipefail-induced task failure.
        mapfile -t nums < <(
          ufw status numbered \
            | { grep -E "\] +({{ gdbstub_acl_tls_port }}|{{ gdbstub_range }})/tcp +ALLOW IN " || true; } \
            | { grep -vF "{{ worker_cidr }}" || true; } \
            | sed -E 's/^\[ *([0-9]+)\].*/\1/' \
            | sort -rn
        )
        pruned=0
        for n in "${nums[@]}"; do
          [ -n "$n" ] || continue
          ufw --force delete "$n" >/dev/null
          pruned=1
        done
        echo "pruned=$pruned"
      args:
        executable: /bin/bash
      register: gdbstub_acl_ufw_prune
      changed_when: "'pruned=1' in gdbstub_acl_ufw_prune.stdout"
      # NOT gated on gdbstub_acl_ufw_enable: the allow/deny rule tasks above run
      # unconditionally, so a worker_cidr change leaves a stale allow even when this run
      # does not flip ufw active (enable=false, ufw enforced by other means). Pruning
      # must track those tasks, not the enable flag, or the over-permission persists in
      # that path. Safe when ufw is inactive: `ufw status numbered` lists no rules, the
      # grep matches nothing, and the task is a no-op.

    - name: Read ufw status  # noqa: command-instead-of-module
      # Reading enforcement state; the ufw module sets rules, it has no is-active read.
      ansible.builtin.command: ufw status
      register: gdbstub_acl_ufw_status
      changed_when: false

    - name: Assert ufw is active so the gdbstub/TLS ACL is actually enforced
      ansible.builtin.assert:
        that:
          - "'Status: active' in gdbstub_acl_ufw_status.stdout"
        fail_msg: >-
          ufw is INACTIVE — the gdbstub/TLS ACL is not enforced and the raw-TCP debug
          ports are world-open. Set gdbstub_acl_ufw_enable=true (default) or enable ufw
          (with an SSH allow) by other means before registering this host.
        success_msg: "ufw active; gdbstub/TLS ACL enforced."
