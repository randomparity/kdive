apiVersion: v2
name: kdive
description: kdive control plane (server/worker/reconciler)
type: application
# Two version fields, distinct tracks (ADR-0365):
#   version    — the chart PACKAGE version (templates/values/packaging), its own SemVer
#                track, bumped by hand when the chart changes. Not tied to appVersion; not
#                enforced by chart-version-check. Used by Helm for packaging/upgrade ordering.
#   appVersion — the deployed APPLICATION version. MUST mirror pyproject [project].version
#                (ADR-0041 source of truth); `just set-version` rewrites it and
#                `just chart-version-check` fails CI on any appVersion != pyproject drift.
version: 0.4.0
appVersion: "0.3.0"
