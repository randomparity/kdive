name: Bug report
description: Report a defect in KDIVE
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Do not report security vulnerabilities here —
        see the [Security policy](../../security/policy) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the actual behavior you observed.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal sequence that triggers the bug.
      placeholder: |
        1. Run ...
        2. Call tool ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `python -m kdive --version`.
      placeholder: kdive 0.3.0-dev+g69d208a6
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and provider
      description: >
        OS and version, Python version, deployment shape
        (host process / docker compose / Helm), and which provider is in use
        (local-libvirt, remote-libvirt, fault-inject).
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output. It will be formatted as code.
      render: shell
    validations:
      required: false
