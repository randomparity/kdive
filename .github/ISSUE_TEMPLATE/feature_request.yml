name: Feature request
description: Propose a new capability or change to KDIVE
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and motivation
      description: >
        What problem are you trying to solve? Describe the use case and why the
        current behavior falls short.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like and how it would be used.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you set them aside.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related ADRs, issues, or discussions.
    validations:
      required: false
