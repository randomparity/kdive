name: live-vm gates

# The two live_vm gates live here, NOT in ci.yml, because GitHub triggers are workflow-level: a
# `schedule` on ci.yml's shared `on:` would fire every job nightly. Carrying no `pull_request`
# trigger also makes fork-PR dispatch to the self-hosted runner structurally impossible (#1293,
# ADR-0389).
on:
  schedule:
    - cron: "0 7 * * *" # nightly ~07:00 UTC
  workflow_dispatch:
    inputs:
      tcg_image:
        description: "ppc64le catalog rootfs image stage-tcg-images.sh builds from"
        required: false
        # Must be a real fixtures/local-libvirt/rootfs_catalog.toml entry (test_live_workflow_shape
        # pins this). The ppc64le TCG guest image; `fedora-ppc64le` was not a catalog name.
        default: "fedora-kdive-ready-43-cloud-ppc64le"
      debuginfod_urls:
        description: "DEBUGINFOD_URLS: a server indexing the distro kernel debuginfo (both jobs)"
        required: false
        default: "https://debuginfod.fedoraproject.org/"
      ppc64le_bundle:
        description: "Optional: directory with the #1146 kernel bundle (opt-in fourth proof)"
        required: false
        default: ""
      warm_nvr:
        description: "native: KDIVE_WARM_STORE_TARGET_NVR — the pinned kernel NVR to warm"
        required: false
        default: ""
      warm_image:
        description: "native: KDIVE_WARM_STORE_IMAGE — the catalog rootfs image to build from"
        required: false
        default: ""
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tcg:
    name: live_vm_tcg (hosted)
    # No fork-PR risk (hosted, no /dev/kvm, secrets ride trusted events); belt-and-suspenders to
    # the workflow having no pull_request trigger at all.
    if: github.event_name != 'pull_request'
    # NOT ubuntu-latest. build-fs imports the `guestfs` C extension, which must ABI-match the
    # interpreter, and kdive pins Python 3.14 — only Ubuntu 26.04 ships a system 3.14 with a
    # matching python3-guestfs (ADR-0387; 24.04's binding is 3.12-only and cannot be imported at
    # all). `ubuntu-latest` tracks the GA image, so it would silently drop back to 24.04.
    # 26.04 is a GitHub public-preview image: pin the explicit label so a preview-to-GA relabel
    # cannot move this job, and expect occasional capacity queueing.
    runs-on: ubuntu-26.04
    # timeout-minutes is set from the measured boot-to-panic wall-time (ceil(measured x 1.5), floor
    # 30) by the local TCG proof (#1293 plan Task 7); 30 is the floor default until measured.
    timeout-minutes: 30
    concurrency:
      group: live-tcg-${{ github.ref }}
      cancel-in-progress: false
    env:
      # workflow_dispatch inputs are read via env (not interpolated into run:) to avoid script
      # injection; on schedule/push they are empty, so fall back to the documented defaults below.
      TCG_IMAGE_INPUT: ${{ github.event.inputs.tcg_image }}
      DEBUGINFOD_INPUT: ${{ github.event.inputs.debuginfod_urls }}
      BUNDLE_INPUT: ${{ github.event.inputs.ppc64le_bundle }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install host deps (ppc64le emulator, libguestfs, elfutils, debuginfod, libvirt-dev)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-ppc libguestfs-tools e2fsprogs elfutils debuginfod libvirt-dev \
            python3-guestfs libvirt-daemon-system libvirt-clients qemu-utils

      # libguestfs builds its supermin appliance from the HOST kernel, which Ubuntu ships
      # 0600 root:root — the non-root runner cannot read it, so virt-tar-out dies with a bare
      # "supermin exited with error status 1" and build-fs never produces a rootfs (ADR-0222
      # cause 1). The self-hosted runner gets this from deploy/ansible/roles/live_vm_host, which
      # uses 0640 root:kvm because that box is persistent and its runner user is in the kvm group.
      # A hosted runner is ephemeral and single-tenant with no such group, so 0644 is the simpler
      # equivalent and exposes nothing that outlives the job. Must precede the staging spine.
      - name: Make the host kernel readable to libguestfs (supermin appliance build)
        run: |
          sudo chmod 0644 /boot/vmlinuz-*
          ls -l /boot/vmlinuz-*

      # /dev/kvm is root:kvm 0660 and the runner is not in the kvm group. `usermod -aG` cannot help:
      # group membership is fixed at login, so it would not reach the already-running job shell.
      # chmod is the fix libguestfs itself suggests, and on an ephemeral single-tenant runner it
      # exposes nothing that outlives the job. Without it the libguestfs appliance emulates, which
      # this gate's timeout cannot absorb. Session-mode libvirt needs XDG_RUNTIME_DIR to exist, so
      # enable linger the way deploy/ansible/roles/live_vm_host does.
      - name: Make KVM usable and give the runner a session bus (qemu:///session)
        run: |
          sudo chmod 0666 /dev/kvm
          sudo loginctl enable-linger "$(id -un)"
          ls -l /dev/kvm

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # --python /usr/bin/python3: uv otherwise installs its own managed CPython, whose minor
      # version need not match the distro's python3-guestfs .so. The binding is a C extension, so
      # the venv must be built against the SAME interpreter the .so was compiled for — the same
      # pin deploy/ansible/roles/live_vm_host applies on the self-hosted box.
      - name: Sync dependencies against the system interpreter (ABI-match python3-guestfs)
        run: uv sync --locked --group live --python /usr/bin/python3

      # libguestfs publishes no PyPI wheel, so the system binding is symlinked into the venv
      # exactly as live_vm_host does. Debian installs it into the version-agnostic
      # /usr/lib/python3/dist-packages as guestfs.py plus libguestfsmod.cpython-<abi>.so — both
      # are needed; guestfs.py alone imports nothing. The final import is the point of the step:
      # build-fs only reaches `import guestfs` several minutes into the image build, so proving it
      # here turns a slow, opaque mid-build failure into an immediate, obvious one.
      - name: Link the system libguestfs binding into the venv
        run: |
          shopt -s nullglob
          # Checked separately, and the .so via a glob: nullglob drops an unmatched WILDCARD, but
          # a literal missing guestfs.py would survive and become a dangling symlink.
          pure=/usr/lib/python3/dist-packages/guestfs.py
          native=(/usr/lib/python3/dist-packages/libguestfsmod*.so)
          if [ ! -e "$pure" ] || [ "${#native[@]}" -eq 0 ]; then
            echo "libguestfs binding incomplete under /usr/lib/python3/dist-packages" \
                 "(guestfs.py: $([ -e "$pure" ] && echo present || echo MISSING)," \
                 "native module: ${#native[@]} found) — is python3-guestfs installed?" >&2
            exit 1
          fi
          site="$(.venv/bin/python -c 'import sysconfig; print(sysconfig.get_paths()["purelib"])')"
          ln -sfn "$pure" "${native[@]}" "${site}/"
          .venv/bin/python -c 'import guestfs; print("guestfs binding:", guestfs.__file__)'

      - name: Run the live_vm_tcg spine (stage -> map -> preflight -> test, one shell)
        # ONE run: block — each Actions run: is a fresh shell, so the staged KDIVE_LIVE_VM_* exports
        # and the mapped spine env must live in the same shell as the preflight and the suite.
        run: |
          set -euo pipefail
          # Backends (postgres/minio/oidc + bucket + migrations) then the app tier (server/
          # worker/reconciler) as compose services; the tcg tier drives them over HTTP.
          just stack-up
          # stack-up brings up backends only. Build the shared app image before the app tier:
          # only the `migrate` service carries `build: .` (tagging kdive:dev); server/worker/
          # reconciler are image-only, so with no local kdive:dev `compose up` tries to PULL it
          # from a registry and dies "pull access denied for kdive". Build it explicitly first.
          docker compose build migrate
          docker compose up -d --wait server worker reconciler

          # Session mode (worker-owned QEMU, runner-readable console — ADR-0223), for the same
          # reason the native job below pins it: under qemu:///system the console log and core are
          # root-owned and this non-root job could not read them back. It also needs no libvirt
          # group membership, which a usermod inside the job could not grant anyway. lib.sh
          # defaults this to qemu:///system, so it must be exported before anything uses libvirt.
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          export KDIVE_LIBVIRT_URI="qemu:///session"
          # Front-load the HOST contract (libvirt reachable, /dev/kvm usable). build-fs opens
          # libvirt only after minutes of image work, so without this a missing daemon costs a
          # whole run to discover — the same fail-fast rule the tool preflights already follow.
          scripts/live-vm/preflight-env.sh host

          # Stage the ppc64le TCG image set onto /mnt under the measured budget (#1292); it exports
          # KDIVE_LIVE_VM_ROOTFS / _BZIMAGE / _VMLINUX. Capture-then-eval so a staging failure
          # (enforce_budget die, a fetch error) fails HERE with its own message — set -e does not
          # catch a non-zero exit inside `eval "$(cmd)"` directly.
          # /mnt is the hosted runner's large ephemeral disk, but it is root-owned, so the runner
          # user cannot mkdir there. Pre-create a runner-owned parent (hosted runners have
          # passwordless sudo) and point the stager at a SUBDIR it fully controls — the script
          # rm -rf's + recreates KDIVE_TCG_STAGE_DIR, which must not be the root-owned mount point.
          sudo mkdir -p /mnt/kdive-tcg
          sudo chown "$(id -u):$(id -g)" /mnt/kdive-tcg
          export KDIVE_TCG_STAGE_DIR=/mnt/kdive-tcg/set
          # On schedule/push TCG_IMAGE_INPUT is empty, so this fallback must be a REAL catalog entry
          # (kept identical to the workflow_dispatch tcg_image default above) — a bogus name like the
          # old `fedora-ppc64le` made every non-dispatch run fail at build-fs. test_live_workflow_shape
          # pins both this literal and the input default as catalog entries and pins them equal.
          export KDIVE_TCG_IMAGE="${TCG_IMAGE_INPUT:-fedora-kdive-ready-43-cloud-ppc64le}"
          export DEBUGINFOD_URLS="${DEBUGINFOD_INPUT:-https://debuginfod.fedoraproject.org/}"
          tcg_wiring="$(scripts/live-vm/stage-tcg-images.sh)"
          eval "$tcg_wiring"

          # The canonical host-side stack env (KDIVE_DATABASE_URL / _OIDC_ISSUER / _STACK_BASE_URL /
          # _S3_* / AWS_* minioadmin) lives in env.sh — source it rather than duplicate the values,
          # which would drift from the compose ports and re-declare the credential literals.
          # shellcheck disable=SC1091
          source scripts/live-stack/env.sh
          # Map C's store output onto the spine env (the tcg proofs read KDIVE_GUEST_IMAGE_PPC64LE,
          # not the throwaway KDIVE_LIVE_VM_ROOTFS) and supply the arch-opaque kernel tree.
          export KDIVE_GUEST_IMAGE_PPC64LE="$KDIVE_LIVE_VM_ROOTFS"
          export KDIVE_KERNEL_SRC
          KDIVE_KERNEL_SRC="$(scripts/fetch-kernel-tree.sh)"
          # KDIVE_PPC64LE_BUNDLE is the opt-in fourth proof; unset -> the three core proofs run.
          [ -n "${BUNDLE_INPUT:-}" ] && export KDIVE_PPC64LE_BUNDLE="$BUNDLE_INPUT"

          scripts/live-vm/preflight-env.sh tcg
          just test-live-tcg

  native:
    name: live_vm (self-hosted KVM)
    # POSITIVE allowlist — NOT `!= 'pull_request'`, which would admit push and fire the
    # RCE-sensitive, minutes-scale self-hosted boot on every commit to main.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, kvm, x64]
    timeout-minutes: 90
    concurrency:
      # Distinct per-job group so a long native boot does not cross-block the hosted tcg gate.
      group: live-native-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run both native families (reaper -> stack -> mint -> preflight -> test, one shell)
        # ONE run: block. Reuse /opt/kdive's libguestfs venv as the interpreter and overlay the
        # tested sources via PYTHONPATH — never mutate /opt/kdive, never uv sync in the workspace.
        env:
          KDIVE_PYTHON: /opt/kdive/.venv/bin/python
          # warm-store.sh's pins have no defaults (they are deployment-specific): a workflow_dispatch
          # override, else the operator-set repo variables. Read via env (not interpolated into run:)
          # to avoid injection. A scheduled run with the repo vars unset fails loud at warm-store.
          WARM_NVR_INPUT: ${{ github.event.inputs.warm_nvr }}
          WARM_IMAGE_INPUT: ${{ github.event.inputs.warm_image }}
          DEBUGINFOD_INPUT: ${{ github.event.inputs.debuginfod_urls }}
          WARM_NVR_VAR: ${{ vars.KDIVE_WARM_STORE_TARGET_NVR }}
          WARM_IMAGE_VAR: ${{ vars.KDIVE_WARM_STORE_IMAGE }}
          DEBUGINFOD_VAR: ${{ vars.KDIVE_DEBUGINFOD_URLS }}
        run: |
          set -euo pipefail
          export PYTHONPATH="${GITHUB_WORKSPACE}/src"

          # Both live_vm families boot under qemu:///session (worker-owned QEMU), NOT qemu:///system.
          # The runner service account is non-root AND has no sudo, so it can neither read
          # qemu:///system's root-owned console log (ADR-0223 root-readback wall) nor launch a root
          # worker to sidestep it — the same wall the warm-store build below already avoids. Session
          # mode runs QEMU as the runner user (readable console) and is fully provisioned on the box
          # (ansible enables linger + /run/user/<uid>); the provider's SLIRP user-networking needs no
          # libvirt bridge, so it is session-native. Set before the reaper + up.sh so every actor —
          # reaper, worker, mint, preflight, pytest — shares the one URI.
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          export KDIVE_LIBVIRT_URI="qemu:///session"

          # Pre-job reaper: a run cancelled mid-boot (cancel-in-progress is false, but a crash or
          # timeout still leaves state) must not collide with this run's on-box stand-up. `virsh
          # destroy` only powers off a RUNNING domain; a crash leaves shut-off domain definitions and
          # multi-GB disks that `docker compose down -v` (which wipes the tracking DB) then orphans.
          # So destroy-then-undefine WITH storage removal, tolerant of already-absent/shut-off state.
          # Sweep session (where this gate's domains live) AND system (legacy leftovers from before
          # the session move). Assumes a SINGLE runner per libvirt host: the `^kdive-` match is
          # host-wide, so a second concurrent runner would reap a peer's in-flight domains (runbook).
          for uri in qemu:///session qemu:///system; do
            for dom in $(virsh -c "$uri" list --all --name 2>/dev/null | grep -E '^kdive-'); do
              virsh -c "$uri" destroy "$dom" 2>/dev/null || true
              virsh -c "$uri" undefine --nvram --remove-all-storage "$dom" 2>/dev/null || true
            done
          done
          docker compose down -v 2>/dev/null || true
          df -h /var/lib/libvirt 2>/dev/null | tail -1 || true # disk-free observability (leak check)

          # Throwaway family rootfs from the warm store. Its pins come from a dispatch override
          # else the operator-set repo vars; unset -> warm-store.sh dies loud (deployment-specific,
          # no sane default). A rebuild boots build-fs under qemu:///session so the customize guest
          # runs as the runner user (the runbook's warm-store prerequisite — qemu:///system would hit
          # the root-readback wall for the non-root runner). Capture-then-eval so a failure fails
          # HERE with its own die message (set -e does not catch `eval "$(cmd)"` directly).
          export KDIVE_WARM_STORE_TARGET_NVR="${WARM_NVR_INPUT:-${WARM_NVR_VAR}}"
          export KDIVE_WARM_STORE_IMAGE="${WARM_IMAGE_INPUT:-${WARM_IMAGE_VAR}}"
          export DEBUGINFOD_URLS="${DEBUGINFOD_INPUT:-${DEBUGINFOD_VAR}}"
          warm_wiring="$(KDIVE_LIBVIRT_URI=qemu:///session scripts/live-vm/warm-store.sh)"
          eval "$warm_wiring"
          # emit_wiring prints BARE assignments (no `export`), so eval leaves them non-exported;
          # export them here so the child mint-system.sh / preflight / pytest inherit the rootfs path.
          export KDIVE_LIVE_VM_ROOTFS KDIVE_LIVE_VM_BZIMAGE KDIVE_LIVE_VM_VMLINUX

          # Provisioned family on the box: bring up the stack, then mint one System. The worker runs
          # non-root (KDIVE_WORKER_AS_ROOT=0, so up.sh takes no sudo path); it inherits the session
          # URI exported above, so its provisioned domain and console log are runner-owned/readable.
          KDIVE_WORKER_AS_ROOT=0 scripts/live-stack/up.sh --skip-obs
          # up.sh sources env.sh in its OWN process; source it here for KDIVE_S3_* + KDIVE_STACK_BASE_URL.
          # shellcheck disable=SC1091
          source scripts/live-stack/env.sh
          # Re-assert the session URI: lib.sh defaults KDIVE_LIBVIRT_URI un-exported (to system), which
          # sourcing env.sh does not carry into this shell for the mint/preflight/pytest that follow.
          export KDIVE_LIBVIRT_URI="qemu:///session"
          KDIVE_LIVE_VM_SYSTEM_ID="$(scripts/live-vm/mint-system.sh)"
          export KDIVE_LIVE_VM_SYSTEM_ID

          scripts/live-vm/preflight-env.sh throwaway provisioned
          # Run pytest directly under the /opt/kdive interpreter — NOT `just test-live`, whose
          # `uv run` would ignore KDIVE_PYTHON, sync a fresh workspace .venv (violating the
          # never-uv-sync-in-workspace invariant), and omit the `live` group that carries drgn (a
          # native live_vm test imports drgn in-process). /opt/kdive already has drgn + guestfs, so
          # this also needs no `just` on the self-hosted runner.
          "$KDIVE_PYTHON" -m pytest -m "live_vm and not live_vm_tcg" -q
