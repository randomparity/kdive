# Custom self-hosted runner labels used by this repo. Declaring them here lets
# actionlint distinguish an intentional label from a typo.
#
# ubuntu-26.04 is not self-hosted: it is a GitHub-hosted public-preview image that the tcg gate
# needs for its system Python 3.14 + matching python3-guestfs (ADR-0387). actionlint's built-in
# label list only carries GA images, so declaring it here is the documented way to accept it.
# Drop this entry once 26.04 reaches GA and actionlint ships it.
self-hosted-runner:
  labels:
    - kvm
    - ubuntu-26.04
